<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sana Özel 💌</title>

<style>
body {
    margin:0;
    height:100vh;
    background:#0b0b12;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.kutu {
    text-align:center;
    padding:30px;
}

h1 {
    font-size:35px;
}

p {
    font-size:20px;
    line-height:1.5;
}

button {
    background:#ff4d88;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:30px;
    font-size:20px;
    cursor:pointer;
}

#mesaj {
    display:none;
}

.kalp {
    position:absolute;
    animation:uc 5s linear infinite;
}

@keyframes uc {
    from {
        transform:translateY(100vh);
        opacity:1;
    }
    to {
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<div class="kutu">

<div id="ilk">
<h1>💌 Bir sürpriz var</h1>
<p>Hazırsan başla...</p>
<button onclick="basla()">Başla</button>
</div>

<div id="mesaj">
<h1>❤️</h1>
<p>
Bazen kelimeler yetmez ama bilmeni istediğim bir şey var...
<br><br>
Sen benim için özelsin.
</p>
</div>

</div>


<script>

function basla(){
document.getElementById("ilk").style.display="none";
document.getElementById("mesaj").style.display="block";

for(let i=0;i<20;i++){
let kalp=document.createElement("div");
kalp.innerHTML="❤️";
kalp.className="kalp";
kalp.style.left=Math.random()*100+"%";
kalp.style.fontSize=(10+Math.random()*25)+"px";
kalp.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(kalp);
}

}

</script>

</body>
</html>
